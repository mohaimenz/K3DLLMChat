apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: k3d-llm-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: k3d-llm-sidecar/frontend:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10

      restartPolicy: Always
