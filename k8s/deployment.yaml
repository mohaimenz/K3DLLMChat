apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: k3d-llm-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
    spec:
      initContainers:
        - name: model-downloader
          image: k3d-llm-sidecar/model-downloader:latest
          imagePullPolicy: Never
          volumeMounts:
            - name: model-cache
              mountPath: /models
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: k3d-llm-config
                  key: MODEL_ID
            - name: HF_HOME
              value: "/models/hf"
            - name: HF_HUB_CACHE
              value: "/models/hf"
            - name: TRANSFORMERS_CACHE
              value: "/models/hf"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi

      containers:
        - name: inference
          image: k3d-llm-sidecar/inference:latest
          imagePullPolicy: Never
          ports:
            - name: inference
              containerPort: 8001
          volumeMounts:
            - name: model-cache
              mountPath: /models
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: k3d-llm-config
                  key: MODEL_ID
            - name: HF_HOME
              value: "/models/hf"
            - name: HF_HUB_CACHE
              value: "/models/hf"
            - name: TRANSFORMERS_CACHE
              value: "/models/hf"
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

        - name: fastapi-sidecar
          image: k3d-llm-sidecar/fastapi-api:latest
          imagePullPolicy: Never
          ports:
            - name: api
              containerPort: 8000
          volumeMounts:
            - name: model-cache
              mountPath: /models
          env:
            - name: INFERENCE_HOST
              valueFrom:
                configMapKeyRef:
                  name: k3d-llm-config
                  key: INFERENCE_HOST
            - name: INFERENCE_PORT
              valueFrom:
                configMapKeyRef:
                  name: k3d-llm-config
                  key: INFERENCE_PORT
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: k3d-llm-config
                  key: MODEL_ID
            - name: SYSTEM_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: k3d-llm-config
                  key: SYSTEM_MESSAGE
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health/live
              port: 8000
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc

      restartPolicy: Always
